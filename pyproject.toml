[tool.black]
line-length = 120
target-version = ["py312"]
[tool.ruff]
line-length = 120
target-version = "py312"
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008", "E501"]
[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
strict = true
[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
